<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Área de Testes</title>

  <meta name="theme-color" content="#0a0a12"/>
  <link rel="stylesheet" href="../style.css"/>

  <!-- Auth (não mexer) -->
  <script src="../assets/js/testes-auth.js" defer></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      window.N1TestAuth.guard();

      const u = window.N1TestAuth.getUser();
      document.getElementById("who").textContent = u?.name ? `Logado como: ${u.name}` : "";

      document.getElementById("logout").onclick = () => {
        window.N1TestAuth.logout();
        window.location.replace("./login.html");
      };
    });
  </script>

  <!-- VISUAL PREMIUM (apenas visual) -->
  <style>
    /* Fundo vivo no estilo do print 2 (glow + aurora) */
    body{
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 28%, rgba(255,47,216,0.18), transparent 42%),
        radial-gradient(circle at 78% 70%, rgba(92,27,143,0.28), transparent 52%),
        linear-gradient(135deg, #070710 0%, #120022 55%, #070710 100%);
      overflow-x: hidden;
    }

    /* Camadas animadas (vivo) */
    body::before{
      content:"";
      position: fixed;
      inset: -35%;
      background: radial-gradient(closest-side, rgba(255,47,216,0.18), transparent 65%);
      filter: blur(18px);
      transform: translateX(-35%) rotate(12deg);
      animation: bgSweep 10s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
      opacity: .9;
    }

    body::after{
      content:"";
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(circle at 25% 35%, rgba(92,27,143,0.18), transparent 55%),
        radial-gradient(circle at 78% 72%, rgba(255,47,216,0.10), transparent 60%);
      filter: blur(22px);
      animation: bgFloat 14s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
      opacity: .75;
    }

    @keyframes bgSweep{
      0%   { transform: translateX(-35%) rotate(12deg); opacity: .70; }
      100% { transform: translateX(35%)  rotate(12deg); opacity: 1; }
    }

    @keyframes bgFloat{
      0%   { transform: translateY(10px) scale(1); opacity: .60; }
      100% { transform: translateY(-18px) scale(1.05); opacity: .85; }
    }

    /* Conteúdo sempre acima do fundo */
    main.wrap{
      position: relative;
      z-index: 1;
      padding-top: 120px; /* deixa o topo parecido com o print 2 */
    }

    /* Header alinhado como print 2 (logo/texto à esquerda, ação à direita) */
    header.row{
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    /* Ajuste fino tipografia */
    .wrap h1{
      font-size: 40px;
      letter-spacing: -0.02em;
    }

    #who{
      margin-top: 6px;
      color: rgba(199,199,214,.95);
    }

    /* Card mais “glass premium” (como no print 2) */
    .card{
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
    }

    .card.link:hover{
      border-color: rgba(255,47,216,0.40);
      box-shadow: 0 26px 70px rgba(0,0,0,.65), 0 0 44px rgba(255,47,216,.14);
    }

    /* Botão Sair no padrão roxo/gradient */
    #logout.btn{
      background: var(--gradient-primary);
      color: #fff;
      box-shadow: 0 10px 30px rgba(255,47,216,0.22);
      border: none;
      padding: 10px 16px;
      border-radius: 14px;
      height: 40px;
    }

    #logout.btn:hover{
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(255,47,216,0.35);
    }

    /* Grid: deixa 1 card largo em telas grandes (igual sensação do print 1/2) */
    .grid{
      grid-template-columns: 1fr;
      margin-top: 26px;
      max-width: 980px;
    }

    @media (max-width: 900px){
      .wrap h1{ font-size: 34px; }
      main.wrap{ padding-top: 110px; }
      .grid{ max-width: 100%; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="row" style="justify-content:space-between;gap:12px;">
      <div>
        <h1>Área de Testes</h1>
        <p id="who" style="opacity:.92;margin:0;"></p>
      </div>
      <button class="btn" id="logout">Sair</button>
    </header>

    <section class="grid">
      <a class="card link" href="./t1/video.html">
        <h2>Teste 1</h2>
        <p>Vídeo obrigatório + prova (15 questões)</p>
      </a>
    </section>
  </main>
</body>
</html>
