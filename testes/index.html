<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Área de Testes</title>
  <meta name="theme-color" content="#0a0a12" />
  <link rel="stylesheet" href="../style.css" />
</head>

<body>

  <!-- Guard: trava acesso se não tiver token (NÃO MEXE) -->
  <script src="../assets/js/testes-auth.js" defer></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      window.N1TestAuth.guard();

      const u = window.N1TestAuth.getUser();
      document.getElementById("who").textContent = u?.name ? `Logado como: ${u.name}` : "";

      document.getElementById("logout").onclick = () => {
        window.N1TestAuth.logout();
        window.location.replace("./login.html");
      };
    });
  </script>

  <!-- Watermark (logo gigante no fundo) -->
  <div class="bg-watermark bg-watermark--app" aria-hidden="true"></div>

  <!-- TOPBAR no padrão do app (visual) -->
  <header class="app-header">
    <div class="container app-header-inner">

      <a class="brand"
         href="https://pithermachado.github.io/treinamenton1"
         aria-label="Voltar para a página principal do treinamento">
        <span class="brand-mark" aria-hidden="true"></span>
        <strong class="brand-name">PORTAL N1</strong>
      </a>

      <div class="app-actions">
        <button class="btn btn-ghost" id="logout" type="button">Sair</button>
      </div>

    </div>
  </header>

  <main class="app">
    <div class="container">

      <!-- HERO -->
      <section class="app-hero">
        <h1 class="app-title">Área de Testes</h1>
        <p class="app-subtitle" id="who"></p>
      </section>

      <!-- GRID -->
      <section class="section section-modules">
        <header class="section-header">
          <h2 class="section-title">Testes disponíveis</h2>
          <p class="section-subtitle">Abra o teste para iniciar o vídeo obrigatório.</p>
        </header>

        <div class="grid modules-grid" style="grid-template-columns: 1fr; max-width: 920px;">

          <article class="card module-card module-card-featured">
            <div class="module-meta">
              <span class="module-number">01</span>
              <span class="module-tag">Vídeo + Prova</span>
            </div>

            <h3 class="module-title">Teste 1</h3>

            <p class="module-desc">
              Vídeo obrigatório + prova (15 questões).
            </p>

            <div class="module-footer">
              <span class="pill">Obrigatório</span>
              <a class="btn btn-primary" href="./t1/video.html">Abrir →</a>
            </div>
          </article>

        </div>
      </section>

    </div>
  </main>

</body>
</html>
