<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>Teste 1 • Vídeo</title>
  <meta name="description" content="Vídeo obrigatório para liberar a prova." />
  <meta name="theme-color" content="#000000" />

  <style>
    /* CORTINA DE FERRO */
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    /* vídeo ocupa a tela toda, sem borda e sem UI */
    #testVideo{
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000;
      object-fit: contain; /* mantém proporção (use cover se quiser preencher cortando) */
      outline: none;
    }

    /* overlay discreto (opcional) */
    .hint {
      position: fixed;
      left: 14px;
      bottom: 14px;
      font: 500 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: rgba(255,255,255,.65);
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <!-- Guard: exige login específico da área de testes -->
  <script src="../../assets/js/testes-auth.js"></script>
  <script>window.N1TestAuth.guard();</script>

  <video
    id="testVideo"
    playsinline
    preload="auto"
    disablepictureinpicture
    controlslist="nodownload noplaybackrate noremoteplayback"
  >
    <source src="../../assets/videos/t1.mp4" type="video/mp4" />
    Seu navegador não suporta vídeo HTML5.
  </video>

  <div class="hint" id="hint">Assista até o final para liberar a prova.</div>

  <script>
    // ===== CONFIG DO TESTE =====
    const TEST_ID = "t1";
    const KEY_WATCHED = `n1_tests_${TEST_ID}_watched_v1`;
    const KEY_STARTED = `n1_tests_${TEST_ID}_started_v1`; // se iniciou fluxo, não volta ao vídeo
    const KEY_DONE    = `n1_tests_${TEST_ID}_done_v1`;    // prova finalizada

    const video = document.getElementById("testVideo");
    const hint = document.getElementById("hint");

    // ===== Regras de fluxo =====
    // Se já finalizou, volta pro menu de testes
    if (localStorage.getItem(KEY_DONE) === "1") {
      window.location.replace("../index.html");
    }

    // Se já iniciou o fluxo (ou já assistiu e vai direto), não fica no vídeo
    if (localStorage.getItem(KEY_STARTED) === "1" && localStorage.getItem(KEY_DONE) !== "1") {
      window.location.replace("./iniciar.html");
    }

    // Se já assistiu antes, vai direto pro iniciar (sem mostrar vídeo)
    if (localStorage.getItem(KEY_WATCHED) === "1" && localStorage.getItem(KEY_DONE) !== "1") {
      window.location.replace("./iniciar.html");
    }

    // ===== “Travar” UI do vídeo =====
    // Remove controles totalmente (não aparece barra)
    video.controls = false;

    // Bloqueia menu de contexto (download etc)
    document.addEventListener("contextmenu", (e) => e.preventDefault(), { passive:false });

    // Bloqueia teclas típicas de player
    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      const blocked = [" ", "arrowleft", "arrowright", "arrowup", "arrowdown", "home", "end", "k", "j", "l", "f"];
      if (blocked.includes(k)) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, { capture:true });

    // Anti-seek (mesmo sem controles, impede “pulo”)
    let allowedTime = 0;
    let lastTime = 0;
    let ready = false;

    video.addEventListener("loadedmetadata", () => {
      ready = true;
      allowedTime = 0;
      lastTime = 0;
    });

    video.addEventListener("timeupdate", () => {
      if (!ready) return;
      if (video.currentTime > allowedTime) allowedTime = video.currentTime;
      lastTime = video.currentTime;
    });

    video.addEventListener("seeking", () => {
      if (!ready) return;
      const diff = Math.abs(video.currentTime - lastTime);
      const tolerance = 0.35;
      if (diff > tolerance) {
        video.currentTime = allowedTime;
      }
    });

    video.addEventListener("ratechange", () => {
      if (video.playbackRate !== 1) video.playbackRate = 1;
    });

    // Evita “sair” sem querer (não impede fechar aba, mas avisa)
    window.addEventListener("beforeunload", (e) => {
      if (localStorage.getItem(KEY_WATCHED) !== "1") {
        e.preventDefault();
        e.returnValue = "";
      }
    });

    // Clique para iniciar (já que não tem botão)
    // (mantém simples: se o usuário tocar/clicar, o vídeo dá play)
    document.addEventListener("click", async () => {
      try { await video.play(); } catch(e) {}
    }, { once:true });

    // ===== AO FINAL: marca e REDIRECIONA AUTOMÁTICO =====
    video.addEventListener("ended", () => {
      localStorage.setItem(KEY_WATCHED, "1");
      hint.textContent = "Vídeo concluído. Abrindo a prova...";
      // vai direto pro “BOA SORTE” (iniciar)
      window.location.replace("./iniciar.html");
    });

    // Fallback: se der erro no player
    video.addEventListener("error", () => {
      hint.textContent = "Erro ao carregar o vídeo. Verifique o arquivo em /assets/videos/t1.mp4";
    });
  </script>

</body>
</html>
